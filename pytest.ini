# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -q
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may need temp files)
    slow: Tests that take more than 5 seconds
asyncio_mode = auto
